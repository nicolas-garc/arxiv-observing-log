name: Nightly edition build

on:
  schedule:
    # 08:00 UTC = 03:00 America/New_York (EDT). GitHub Actions cron can drift by
    # a few minutes, which is fine for a nightly edition.
    - cron: "0 8 * * *"
  workflow_dispatch: {}

# Allow the job to commit the freshly built JSON back to main.
permissions:
  contents: write

concurrency:
  group: nightly-edition
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install --upgrade requests

      - name: Build edition
        run: python scripts/build_edition.py

      - name: Commit updated edition
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/latest.json data/editions
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Nightly edition: $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
